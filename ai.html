<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snakery Bakery</title>
    <style>
        body {
            background-color: #ffe4e1; /* Misty Rose */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #d02090;
        }

        h1 {
            margin-bottom: 10px;
            text-shadow: 2px 2px #ffffff;
        }

        #game-container {
            position: relative;
            border: 8px solid #ffb6c1; /* Light Pink border */
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            background-color: #fff0f5;
            overflow: hidden;
        }

        canvas {
            display: block;
        }

        .stats {
            font-size: 20px;
            font-weight: bold;
            margin-top: 15px;
            background: white;
            padding: 10px 20px;
            border-radius: 20px;
            border: 2px solid #ffb6c1;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 240, 245, 0.85);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        button {
            background-color: #ff69b4;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.05);
            background-color: #d02090;
        }
    </style>
</head>
<body>

    <h1>Bakery Snake</h1>
    
    <div id="game-container">
        <canvas id="snakeGame" width="400" height="400"></canvas>
        <div id="overlay">
            <h2 style="margin-bottom: 20px;">Kitchen Closed!</h2>
            <button onclick="resetGame()">Start New Batch</button>
        </div>
    </div>

    <div class="stats">Banana Bread Eaten: <span id="score">0</span></div>

    <script>
        const canvas = document.getElementById("snakeGame");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const overlay = document.getElementById("overlay");

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let score = 0;
        let dx = 0;
        let dy = 0;
        let nextDx = 0;
        let nextDy = 0;
        let isGameOver = false;

        let snake = [
            {x: 10, y: 10},
            {x: 10, y: 11},
            {x: 10, y: 12}
        ];

        let bananaBread = {x: 5, y: 5};

        function drawGame() {
            if (isGameOver) return;

            dx = nextDx;
            dy = nextDy;

            updateSnakePosition();
            
            if (checkGameOver()) {
                isGameOver = true;
                overlay.style.display = "flex";
                return;
            }

            drawBackground();
            checkBreadCollision();
            drawBananaBread();
            drawSnake();

            setTimeout(drawGame, 100);
        }

        function drawBackground() {
            for (let row = 0; row < tileCount; row++) {
                for (let col = 0; col < tileCount; col++) {
                    ctx.fillStyle = (row + col) % 2 === 0 ? "#fff0f5" : "#ffd1dc";
                    ctx.fillRect(col * gridSize, row * gridSize, gridSize, gridSize);
                }
            }
        }

        function updateSnakePosition() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            if (dx !== 0 || dy !== 0) {
                snake.unshift(head);
                snake.pop();
            }
        }

        function drawSnake() {
            snake.forEach((part, index) => {
                const isHead = index === 0;
                
                // Pastel Green Snake Palette
                // Head: Mint Green (#98FFB3), Body: Pale Sage (#B2E2B2)
                ctx.fillStyle = isHead ? "#98ffb3" : "#b2e2b2";
                
                ctx.fillRect(part.x * gridSize + 0.5, part.y * gridSize + 0.5, gridSize - 1, gridSize - 1);

                if (isHead) {
                    // Eyes
                    ctx.fillStyle = "#333"; // Slightly softer black
                    ctx.fillRect(part.x * gridSize + 4, part.y * gridSize + 6, 3, 3);
                    ctx.fillRect(part.x * gridSize + 13, part.y * gridSize + 6, 3, 3);
                }
            });
        }

        function drawBananaBread() {
            const x = bananaBread.x * gridSize;
            const y = bananaBread.y * gridSize;

            // Brown Loaf
            ctx.fillStyle = "#8B4513"; 
            ctx.beginPath();
            ctx.roundRect(x + 2, y + 4, 16, 12, 4); 
            ctx.fill();

            // Crust detail
            ctx.strokeStyle = "#A0522D";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(x + 6, y + 7); ctx.lineTo(x + 6, y + 13);
            ctx.moveTo(x + 10, y + 7); ctx.lineTo(x + 10, y + 13);
            ctx.moveTo(x + 14, y + 7); ctx.lineTo(x + 14, y + 13);
            ctx.stroke();
        }

        function checkBreadCollision() {
            if (snake[0].x === bananaBread.x && snake[0].y === bananaBread.y) {
                score++;
                scoreElement.innerText = score;
                const tail = { ...snake[snake.length - 1] };
                snake.push(tail);
                bananaBread = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
                while(snake.some(p => p.x === bananaBread.x && p.y === bananaBread.y)) {
                    bananaBread.x = Math.floor(Math.random() * tileCount);
                    bananaBread.y = Math.floor(Math.random() * tileCount);
                }
            }
        }

        function checkGameOver() {
            const head = snake[0];
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) return true;
            for (let i = 1; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) return true;
            }
            return false;
        }

        function resetGame() {
            score = 0;
            scoreElement.innerText = score;
            snake = [{x: 10, y: 10}, {x: 10, y: 11}, {x: 10, y: 12}];
            dx = 0; dy = 0; nextDx = 0; nextDy = 0;
            isGameOver = false;
            bananaBread = {x: 5, y: 5};
            overlay.style.display = "none";
            drawGame();
        }

        window.addEventListener("keydown", e => {
            if (isGameOver) return;
            switch (e.key) {
                case "ArrowUp":    if (dy !== 1) { nextDx = 0; nextDy = -1; } break;
                case "ArrowDown":  if (dy !== -1) { nextDx = 0; nextDy = 1; } break;
                case "ArrowLeft":  if (dx !== 1) { nextDx = -1; nextDy = 0; } break;
                case "ArrowRight": if (dx !== -1) { nextDx = 1; nextDy = 0; } break;
            }
        });

        drawGame();
    </script>
</body>
</html>
